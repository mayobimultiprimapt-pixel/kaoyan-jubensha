<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>101 失窃档案 · 红宝书之谜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0a0a0a;color:#fff5e0;font-family:"Songti SC","SimSun","STSong",serif;font-size:17px;line-height:1.75}
body{background:radial-gradient(ellipse at center,#1a0a0a 0%,#050505 70%);}
#app{display:flex;height:100vh;position:relative}
#stage{flex:1;padding:30px 40px;overflow-y:auto;position:relative}
#sidebar{width:280px;background:linear-gradient(180deg,#1a0a0a,#0a0000);border-left:2px solid #3a2a0a;padding:20px;overflow-y:auto;box-shadow:-5px 0 20px rgba(0,0,0,.5)}

::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#4a3a1a;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#6a5a2a}

.title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;animation:fadeIn 2s}
.title-logo{font-size:84px;color:#d4af37;font-family:"STKaiti",serif;text-shadow:0 0 30px #d4af37,0 0 60px #8b0000;letter-spacing:8px;margin-bottom:20px;animation:glowPulse 3s infinite}
.title-sub{font-size:24px;color:#b8860b;letter-spacing:10px;margin-bottom:60px}
.title-desc{font-size:16px;color:#888;max-width:600px;line-height:2;margin-bottom:50px}
.btn-primary{background:linear-gradient(135deg,#8b0000,#d4af37);color:#fff5e0;border:none;padding:15px 60px;font-size:20px;letter-spacing:4px;cursor:pointer;border-radius:3px;font-family:inherit;transition:all .3s;box-shadow:0 0 20px rgba(212,175,55,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(212,175,55,.6)}
.btn-ghost{background:transparent;color:#d4af37;border:1px solid #d4af37;padding:10px 25px;font-size:15px;cursor:pointer;font-family:inherit;margin:5px;border-radius:2px;transition:all .2s}
.btn-ghost:hover{background:#d4af37;color:#0a0a0a}
.btn-choice{display:block;width:100%;background:rgba(139,0,0,.15);border:1px solid #5a2a2a;color:#fff5e0;padding:12px 20px;margin:8px 0;font-size:16px;cursor:pointer;text-align:left;font-family:inherit;border-radius:3px;transition:all .2s}
.btn-choice:hover{background:rgba(212,175,55,.15);border-color:#d4af37;transform:translateX(5px)}
.btn-choice.selected{background:rgba(212,175,55,.3);border-color:#d4af37;color:#d4af37}

.narration{background:rgba(0,0,0,.5);border-left:3px solid #d4af37;padding:20px 25px;margin:20px 0;font-size:17px;line-height:2;color:#e8d7b0;font-style:italic;animation:slideIn .8s}
.scene-title{font-size:28px;color:#d4af37;font-family:"STKaiti",serif;letter-spacing:4px;margin-bottom:15px;border-bottom:1px solid #3a2a0a;padding-bottom:10px}
.scene-meta{font-size:13px;color:#888;margin-bottom:20px;letter-spacing:2px}

.guardian{background:rgba(139,0,0,.1);border:1px solid #5a2a2a;padding:20px;margin:20px 0;border-radius:5px}
.guardian-header{display:flex;align-items:center;margin-bottom:15px}
.guardian-avatar{font-size:42px;margin-right:15px;filter:drop-shadow(0 0 10px #d4af37)}
.guardian-name{font-size:20px;color:#d4af37;font-family:"STKaiti",serif}
.guardian-speech{color:#fff5e0;font-size:17px;line-height:2;padding:10px 0 10px 55px;position:relative}
.guardian-speech::before{content:"「";color:#d4af37;font-size:32px;position:absolute;left:20px;top:0}
.guardian-speech::after{content:"」";color:#d4af37;font-size:32px;margin-left:5px}

.puzzle{background:rgba(26,15,5,.7);border:2px solid #d4af37;padding:25px;margin:25px 0;border-radius:5px;box-shadow:0 0 30px rgba(212,175,55,.15)}
.puzzle-label{font-size:13px;color:#b8860b;letter-spacing:4px;margin-bottom:10px}
.puzzle-q{font-size:18px;color:#fff5e0;line-height:1.9;margin-bottom:20px}
.puzzle-input{width:100%;background:#0a0505;border:1px solid #5a2a2a;color:#fff5e0;padding:12px 15px;font-size:17px;font-family:inherit;border-radius:3px;outline:none}
.puzzle-input:focus{border-color:#d4af37;box-shadow:0 0 10px rgba(212,175,55,.3)}
.puzzle-hint{font-size:14px;color:#888;margin-top:12px;font-style:italic}
.puzzle-feedback{margin-top:15px;padding:10px 15px;border-radius:3px;font-size:15px;animation:fadeIn .5s}
.pf-wrong{background:rgba(255,48,48,.1);border-left:3px solid #ff3030;color:#ffaaaa}
.pf-right{background:rgba(48,255,48,.1);border-left:3px solid #30ff30;color:#aaffaa}
.pf-hint{background:rgba(212,175,55,.1);border-left:3px solid #d4af37;color:#e8d7b0}

/* ============ teachingMoment · 先理解再答题 ============ */
.teaching{background:linear-gradient(135deg,rgba(10,30,50,.55),rgba(20,40,70,.45));border:1px solid #4a90a4;border-radius:6px;padding:25px 30px;margin:20px 0;position:relative;box-shadow:0 0 25px rgba(74,144,164,.15);animation:slideIn .8s}
.teaching::before{content:"◇";color:#7ec8e3;font-size:22px;position:absolute;top:-14px;left:20px;background:#0a0a0a;padding:0 10px}
.teaching-label{color:#7ec8e3;font-size:13px;letter-spacing:5px;margin-bottom:18px;font-family:"STKaiti",serif}
.teaching-body{color:#e0f4ff;font-size:16.5px;line-height:2.1;white-space:pre-wrap;font-style:normal}
.teaching-core{background:linear-gradient(135deg,#d4af37,#ffe58a);color:#1a0a0a;padding:14px 22px;margin-top:22px;border-radius:4px;font-size:16.5px;font-weight:bold;letter-spacing:2px;text-align:center;font-family:"STKaiti",serif;box-shadow:0 4px 15px rgba(212,175,55,.3)}
.teaching-core::before{content:"✦ ";color:#5a3a0a}
.teaching-core::after{content:" ✦";color:#5a3a0a}
.btn-teaching{background:linear-gradient(135deg,#4a90a4,#7ec8e3);color:#0a1a2a;border:none;padding:13px 40px;font-size:17px;letter-spacing:3px;cursor:pointer;border-radius:3px;font-family:inherit;margin:5px;transition:all .3s;box-shadow:0 0 15px rgba(126,200,227,.25)}
.btn-teaching:hover{transform:translateY(-2px);box-shadow:0 0 25px rgba(126,200,227,.5)}

/* 多空填空 */
.multi-fill-grid{display:grid;grid-template-columns:120px 1fr;gap:10px 15px;align-items:center;margin:15px 0}
.multi-fill-label{color:#d4af37;font-size:15px;text-align:right}
/* 排序 */
.order-list{list-style:none;padding:0;margin:15px 0}
.order-item{background:rgba(26,15,5,.8);border:1px solid #5a2a2a;color:#fff5e0;padding:14px 20px;margin:8px 0;border-radius:3px;cursor:pointer;display:flex;align-items:center;transition:all .2s;user-select:none}
.order-item:hover{background:rgba(139,0,0,.2);border-color:#d4af37}
.order-item.selected{background:rgba(212,175,55,.3);border-color:#d4af37;color:#d4af37}
.order-num{display:inline-block;width:28px;height:28px;border-radius:50%;background:#d4af37;color:#0a0a0a;text-align:center;line-height:28px;font-weight:bold;margin-right:15px;font-family:"STKaiti",serif}
/* 多选 */
.multi-opts{margin:15px 0}
.multi-opt{display:flex;align-items:center;background:rgba(26,15,5,.5);border:1px solid #3a2a0a;padding:12px 18px;margin:6px 0;cursor:pointer;border-radius:3px;transition:all .2s}
.multi-opt:hover{border-color:#d4af37;background:rgba(212,175,55,.1)}
.multi-opt.checked{border-color:#d4af37;background:rgba(212,175,55,.25);color:#fff5e0}
.multi-check{width:20px;height:20px;border:2px solid #5a2a2a;border-radius:3px;margin-right:15px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#d4af37}
.multi-opt.checked .multi-check{background:#d4af37;border-color:#d4af37;color:#0a0a0a}
/* 配对 */
.match-board{display:grid;grid-template-columns:1fr 50px 1fr;gap:10px 15px;align-items:center;margin:15px 0}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-cell{background:rgba(26,15,5,.5);border:1px solid #3a2a0a;padding:10px 15px;cursor:pointer;border-radius:3px;transition:all .2s;text-align:center;font-size:15px;min-height:48px;display:flex;align-items:center;justify-content:center}
.match-cell:hover{border-color:#d4af37;background:rgba(212,175,55,.1)}
.match-cell.active{background:rgba(212,175,55,.35);border-color:#d4af37;color:#d4af37}
.match-cell.paired{border-color:#30ff30;background:rgba(48,255,48,.1)}
.match-arrow{color:#888;text-align:center;font-size:14px}

.sandbox{padding:20px}
.sandbox-title{font-size:32px;color:#d4af37;font-family:"STKaiti",serif;text-align:center;margin-bottom:10px;letter-spacing:4px}
.sandbox-sub{text-align:center;color:#888;margin-bottom:40px}
.zones{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:0 auto}
.zone{background:linear-gradient(135deg,rgba(139,0,0,.2),rgba(26,10,5,.8));border:1px solid #5a2a2a;padding:25px;border-radius:5px;cursor:pointer;transition:all .3s;text-align:center}
.zone:hover{border-color:#d4af37;transform:translateY(-3px);box-shadow:0 10px 30px rgba(212,175,55,.2)}
.zone.done{background:linear-gradient(135deg,rgba(212,175,55,.3),rgba(139,0,0,.3));border-color:#d4af37}
.zone-icon{font-size:48px;margin-bottom:10px;display:block}
.zone-name{font-size:22px;color:#d4af37;font-family:"STKaiti",serif;margin-bottom:8px}
.zone-npc{font-size:14px;color:#b8860b;margin-bottom:6px}
.zone-progress{font-size:13px;color:#888}

.room-list{max-width:800px;margin:20px auto}
.room-item{background:rgba(26,10,5,.5);border:1px solid #3a2a0a;padding:15px 20px;margin:10px 0;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.room-item:hover{border-color:#d4af37;background:rgba(139,0,0,.15)}
.room-item.done{border-color:#d4af37;background:rgba(212,175,55,.1)}
.room-item.locked{opacity:.4;cursor:not-allowed}
.room-label{flex:1}
.room-title-txt{font-size:17px;color:#fff5e0;font-weight:bold}
.room-ch{font-size:13px;color:#888;margin-top:3px}
.room-status{font-size:22px;margin-left:15px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowPulse{0%,100%{text-shadow:0 0 30px #d4af37,0 0 60px #8b0000}50%{text-shadow:0 0 50px #d4af37,0 0 90px #8b0000,0 0 100px #d4af37}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.shake{animation:shake .4s}
.header-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #3a2a0a}
.mini-logo{color:#d4af37;font-family:"STKaiti",serif;font-size:18px;letter-spacing:3px}
.progress-bar{display:flex;align-items:center;gap:10px;color:#888;font-size:13px}
.ending-screen{text-align:center;padding:50px;animation:fadeIn 1.5s}
.ending-screen h1{font-size:48px;color:#d4af37;font-family:"STKaiti",serif;letter-spacing:6px;margin-bottom:30px}
.ending-screen p{font-size:17px;line-height:2.2;color:#e8d7b0;max-width:700px;margin:0 auto 30px;text-align:left}
.final-quote{font-size:28px;color:#d4af37;font-family:"STKaiti",serif;text-align:center;margin:40px 0;letter-spacing:4px;text-shadow:0 0 20px #d4af37}
.system-msg{text-align:center;color:#b8860b;font-size:14px;margin:20px 0;letter-spacing:3px;opacity:.7}
.clue-popup{background:linear-gradient(135deg,rgba(139,0,0,.3),rgba(212,175,55,.15));border:1px solid #d4af37;padding:20px;margin:20px 0;border-radius:5px;animation:fadeIn .8s}
.clue-popup-title{color:#d4af37;font-size:15px;letter-spacing:3px;margin-bottom:8px}
.clue-popup-text{color:#fff5e0;font-size:17px;line-height:1.9}
.attempt-counter{font-size:12px;color:#888;margin-top:8px;text-align:right}
.sidebar-title{color:#d4af37;font-family:"STKaiti",serif;font-size:18px;letter-spacing:2px;margin-bottom:12px;border-bottom:1px solid #3a2a0a;padding-bottom:8px}
.badges{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:25px}
.badge{aspect-ratio:1;background:#1a0a05;border:1px solid #3a2a0a;display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:3px;cursor:help;transition:all .2s}
.badge.earned{background:linear-gradient(135deg,#8b0000,#d4af37);border-color:#d4af37;box-shadow:0 0 10px rgba(212,175,55,.4);color:#fff5e0}
.keys{display:flex;gap:8px;justify-content:center;margin-bottom:25px}
.key{width:40px;height:40px;border:1px solid #3a2a0a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:#1a0a05;transition:all .3s}
.key.earned{background:linear-gradient(135deg,#d4af37,#b8860b);border-color:#d4af37;box-shadow:0 0 15px rgba(212,175,55,.6)}
.notebook{max-height:250px;overflow-y:auto;background:rgba(0,0,0,.3);padding:12px;border-radius:3px;font-size:13px;line-height:1.7;color:#b8a87a}
.clue-entry{margin-bottom:10px;padding:8px;border-left:2px solid #8b0000;background:rgba(139,0,0,.1)}
.clue-entry-room{font-size:11px;color:#8b0000;letter-spacing:1px}

/* 音效控制浮动 */
.audio-ctrl{position:fixed;left:20px;bottom:20px;z-index:50;display:flex;gap:8px}
.audio-btn{width:42px;height:42px;border-radius:50%;background:rgba(26,10,5,.9);border:1px solid #5a2a2a;color:#d4af37;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.audio-btn:hover{border-color:#d4af37;background:rgba(139,0,0,.4)}
.audio-btn.active{background:#d4af37;color:#0a0a0a}

/* PDF 打印样式 */
#print-sheet{display:none}
@media print{
    body,html{height:auto;overflow:visible;background:#fff;color:#000}
    #app,.audio-ctrl{display:none !important}
    #print-sheet{display:block;color:#000;background:#fff;padding:0;font-family:"Songti SC","SimSun",serif;font-size:12pt;line-height:1.8}
    .print-page{page-break-after:always;padding:30mm 20mm;min-height:240mm}
    .print-page:last-child{page-break-after:auto}
    .print-cover-logo{font-size:48pt;color:#8b0000;font-family:"STKaiti",serif;text-align:center;letter-spacing:8pt;margin-top:40mm}
    .print-cover-sub{font-size:16pt;color:#333;text-align:center;letter-spacing:6pt;margin-top:10mm}
    .print-cover-title{font-size:24pt;color:#000;text-align:center;margin-top:60mm;font-family:"STKaiti",serif;letter-spacing:4pt}
    .print-cover-date{text-align:center;color:#666;margin-top:30mm;font-size:12pt}
    .print-cover-ending{text-align:center;font-size:18pt;color:#8b0000;margin-top:20mm;font-family:"STKaiti",serif;letter-spacing:3pt}
    .print-h2{font-size:20pt;color:#8b0000;font-family:"STKaiti",serif;letter-spacing:3pt;border-bottom:2pt solid #d4af37;padding-bottom:4mm;margin-bottom:8mm}
    .print-badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4mm;margin-bottom:10mm}
    .print-badge-item{border:1pt solid #d4af37;padding:3mm;font-size:10pt;text-align:center;background:#fff8e8}
    .print-badge-icon{font-size:16pt;margin-bottom:2mm}
    .print-clue-item{padding:3mm 5mm;margin-bottom:3mm;border-left:3pt solid #8b0000;background:#f9f2e8}
    .print-clue-rid{font-size:9pt;color:#8b0000;margin-bottom:2mm;letter-spacing:2pt}
    .print-quote{font-size:16pt;color:#8b0000;text-align:center;font-family:"STKaiti",serif;margin:15mm 0;letter-spacing:3pt}
    .print-signature{text-align:right;margin-top:30mm;font-size:10pt;color:#666;letter-spacing:2pt}
}

/* ======== Mobile responsive (auto-injected) ======== */
@media (max-width:768px){
  html,body{overflow-y:auto !important;overflow-x:hidden !important;height:auto !important;min-height:100vh;font-size:16px}
  #app{flex-direction:column !important;height:auto !important;min-height:100vh;display:flex}
  #stage{padding:18px 14px !important;overflow:visible !important;min-height:auto;flex:none !important;order:1}
  #sidebar{width:100% !important;max-height:none !important;border-left:none !important;border-top:2px solid #3a2a0a !important;padding:16px 16px 90px 16px !important;box-shadow:none !important;order:2;overflow:visible !important}
  .title-screen{min-height:calc(100vh - 20px);padding:20px 10px}
  .title-logo{font-size:52px !important;letter-spacing:4px !important}
  .title-sub{font-size:16px !important;letter-spacing:6px !important}
  .title-desc{font-size:14px !important;padding:0 8px;line-height:1.9}
  .btn-primary{padding:16px 36px !important;font-size:16px !important;letter-spacing:2px !important;width:auto;max-width:90%}
  .btn-choice{padding:14px 16px !important;font-size:15px !important;text-align:left !important;line-height:1.7 !important}
  .btn-ghost{padding:10px 16px !important;font-size:13px !important}
  .scene-title{font-size:22px !important;letter-spacing:2px !important}
  .scene-meta{font-size:12px !important}
  .narration{padding:14px 16px !important;font-size:15px !important;line-height:1.9 !important;margin:14px 0 !important}
  .guardian{padding:14px !important;margin:14px 0 !important}
  .guardian-avatar{font-size:34px !important;margin-right:12px !important}
  .guardian-name{font-size:16px !important}
  .guardian-speech{font-size:15px !important;padding:6px 0 6px 42px !important;line-height:1.9 !important}
  .guardian-speech::before{font-size:24px !important;left:12px !important}
  .guardian-speech::after{font-size:24px !important}
  .puzzle{padding:16px !important;margin:16px 0 !important}
  .puzzle-q{font-size:16px !important;line-height:1.8 !important;margin-bottom:14px !important}
  .puzzle-input{font-size:16px !important;padding:14px 12px !important}
  .zones{grid-template-columns:1fr 1fr !important;gap:12px !important;max-width:100% !important}
  .zone{padding:16px 10px !important}
  .zone-icon{font-size:36px !important}
  .zone-name{font-size:17px !important}
  .zone-npc{font-size:12px !important}
  .zone-progress{font-size:11px !important}
  .multi-fill-grid{grid-template-columns:1fr !important;gap:6px 0 !important}
  .multi-fill-label{text-align:left !important;font-weight:bold;font-size:14px !important;margin-top:6px}
  .badges{grid-template-columns:repeat(10,1fr) !important;gap:4px !important}
  .badge{font-size:14px !important}
  .keys{gap:6px !important}
  .key{width:34px !important;height:34px !important;font-size:16px !important}
  .match-board{grid-template-columns:1fr 34px 1fr !important;gap:8px !important}
  .match-cell{font-size:13px !important;padding:10px 6px !important;min-height:46px !important}
  .audio-ctrl{left:auto !important;right:10px !important;bottom:10px !important;z-index:100}
  .audio-btn{width:38px !important;height:38px !important;font-size:16px !important}
  .header-bar{flex-direction:row !important;gap:8px !important;flex-wrap:wrap}
  .sandbox-title{font-size:26px !important;letter-spacing:2px !important}
  .sandbox-sub{font-size:13px !important}
  .ending-screen h1{font-size:34px !important;letter-spacing:4px !important}
  .ending-screen p{font-size:15px !important;padding:0 6px}
  .final-quote{font-size:20px !important;letter-spacing:2px !important}
  .room-item{padding:12px 14px !important}
  .room-title-txt{font-size:15px !important}
  .room-ch{font-size:12px !important}
  .room-status{font-size:20px !important}
  .clue-popup{padding:14px !important;margin:14px 0 !important}
  .clue-popup-title{font-size:13px !important}
  .clue-popup-text{font-size:14px !important;line-height:1.8 !important}
  .mini-logo{font-size:14px !important;letter-spacing:2px !important}
  .progress-bar{font-size:11px !important}
  .sidebar-title{font-size:15px !important}
  .notebook{max-height:180px !important}
  .order-item{padding:12px 14px !important;font-size:14px !important}
  .order-num{width:24px !important;height:24px !important;line-height:24px !important;font-size:12px !important}
  .multi-opt{padding:10px 14px !important;font-size:14px !important}
  .multi-check{width:18px !important;height:18px !important}
  /* touch-friendly minimum tap size */
  button, .btn-choice, .room-item, .zone, .order-item, .multi-opt, .match-cell{min-height:44px}
}
@media (max-width:420px){
  .zones{grid-template-columns:1fr !important}
  .title-logo{font-size:42px !important}
  .badges{grid-template-columns:repeat(8,1fr) !important}
}
/* iPhone 安全区域 */
@supports(padding:max(0px)){
  #stage{padding-left:max(14px,env(safe-area-inset-left)) !important;padding-right:max(14px,env(safe-area-inset-right)) !important}

/* ======== Follow-up 深入一问 ======== */

    {topic:'三大思想来源具体是什么？',reply:'三大来源——德国古典哲学（黑格尔辩证法 + 费尔巴哈唯物论）、英国古典政治经济学（亚当·斯密 + 李嘉图劳动价值论）、法国空想社会主义（圣西门 / 傅立叶 / 欧文）。马克思把黑格尔"头脚倒立"的辩证法"再颠倒一次"立正——辩证法就站起来了，这叫"合理内核"被救出来。'},

M6:[
    {topic:'《资本论》三卷·恩格斯 30 年整理',reply:'卷一 1867 年马克思亲自出版；卷二 1885、卷三 1894 都是恩格斯在马克思逝世后（1883）整理手稿出的。恩格斯"在我最好朋友的遗稿前当一个十二年的仆人"——这是人类学术史上最感人的一段友谊。'},
    {topic:'剩余价值率 · W-G-W\' 公式考点',reply:'剩余价值率 m\'= m/v（剩余价值 / 可变资本）——反映剥削程度。工人 12 小时劳动、6 小时必要劳动创造 v、另 6 小时剩余劳动创造 m，m\'=100%。易错：m\'≠利润率（p=m/(c+v)）——分母不同。劳动力商品的特殊性：它的使用价值能创造出比自身价值更大的价值——这是剥削的秘密。'}
],
M7:[
    {topic:'"两个必然"与"两个决不会"的辩证',reply:'1848 宣言："两个必然"——资本主义必然灭亡、社会主义必然胜利（揭示总趋势）。1859 序言："两个决不会"——一个社会形态在它容纳的生产力未发挥完之前决不会灭亡；新的更高生产关系在它的物质存在条件未成熟前决不会出现（揭示过程规律）。两者互补，防"左倾冒进"。'},
    {topic:'共产主义两大基本特征',reply:'① 社会生产力高度发达（物质基础）；② 人自由而全面的发展（价值归宿）。共产主义不是"平均主义"，也不是"一夜之间到达的乌托邦"——它是一个"历史过程"。考研大题最爱考："为什么说共产主义是现实运动，不是空想？"答案钥匙就在此。'}
],
P1:[
    {topic:'"马克思主义中国化"概念的正式提出',reply:'1938 年党的六届六中全会，毛泽东首次使用"马克思主义中国化"这个提法。当时背景——党吃够了照搬共产国际指示的亏（陈独秀右倾 / 王明左倾），必须用中国的"民族形式"表达马克思主义。这是党 20 多年血的教训换来的觉悟。'},
    {topic:'两次飞跃·三大成果·最新说法',reply:'历史上讲"两次飞跃"：第一次=毛泽东思想（新民主主义革命）；第二次=中国特色社会主义理论体系（含邓论·三个代表·科学发展观·习近平新时代中国特色社会主义思想）。二十大后最新表述"两个重要理论成果"+"两个结合"（马与中国实际·马与中华优秀传统文化），考研必背。'}
],
P2:[
    {topic:'三座大山——蒋宋孔陈四大家族',reply:'官僚资本主义的具体代表：蒋（介石·军政）、宋（子文·财政）、孔（祥熙·工商）、陈（果夫立夫兄弟·党务）。四大家族抗战胜利后控制了全国主要工业 80%、银行资本 70%——这正是解放战争中"人民抛弃国民党"的经济根源。'},
    {topic:'三大法宝 · 统战 / 武装 / 党建 的内在逻辑',reply:'毛泽东在 1939 年《〈共产党人〉发刊词》首次完整阐述——"统一战线（团结谁打击谁）、武装斗争（用什么打）、党的建设（靠谁打）"三者紧密相连。其中党的建设是领导核心，武装斗争是主要形式，统一战线是重要法宝。考研易错：把这三个顺序或地位搞反。'}
],
P3:[
    {topic:'"一化三改" 过渡时期总路线',reply:'1953 年中央提出"一化三改"——"一化"=社会主义工业化（主体）；"三改"=对农业/手工业/资本主义工商业的社会主义改造（两翼）。"一体两翼"是毛泽东的形象比喻。1956 年三大改造基本完成，中国进入社会主义初级阶段。'},
    {topic:'"四马分肥" 和平赎买的创举',reply:'资本主义工商业改造的关键创新——"赎买政策"。企业利润分为四份："四马"=国家所得税 + 企业公积金 + 职工福利 + 资本家股息（约占 1/4）。资本家变成"自食其力的劳动者"，马克思主义历史上首次"和平过渡"成功。考点："赎买"不是没收——这是伟大创造。'}
],
P4:[
    {topic:'八大的正确决策与此后的偏离',reply:'1956 年八大提出正确主要矛盾——"先进社会制度与落后社会生产力之间的矛盾"（生产发展需要）。但 1957 年反右扩大化后，党错误地把主要矛盾判为"无产阶级与资产阶级矛盾"——这是此后 20 年"左"倾错误的总根源。1981 年《历史决议》对此系统纠正。'},
    {topic:'《论十大关系》十对关系',reply:'1956 年毛泽东《论十大关系》——重工业与轻工业/农业、沿海与内地、经济建设与国防建设、国家/集体/个人、中央与地方、汉族与少数民族、党与非党、革命与反革命、是非、中国与外国——探索中国自己的建设道路。考点："八大路线 + 论十大关系"是那个时代正确的两大标志性成果。'}
],
P5:[
    {topic:'1992 南方谈话——"不争论"的三个字',reply:'1989 后姓"社"姓"资"争论再起，改革开放险些停摆。88 岁的邓小平南下武昌·深圳·珠海·上海——"改革开放胆子要大一点、敢于试验，不能像小脚女人一样。看准了的，就大胆地试，大胆地闯"。"不争论"三个字结束了一场可能毁掉改革的争论。'},
    {topic:'社会主义本质论 · 5 句 28 字',reply:'"解放生产力·发展生产力·消灭剥削·消除两极分化·最终达到共同富裕"——28 字必背。第一次回答"什么是社会主义"这个被说错过的问题。易错：把"消灭剥削·消除两极分化"写成"消灭两极分化·消除剥削"——考研会扣分。'}
],
P6:[
    {topic:'"三个代表"的时代背景',reply:'2000 年 2 月江泽民广东考察首次提出，2001 年 7·1 讲话系统阐述，2002 年十六大写入党章。时代背景——党员队伍从革命党转为长期执政党，"如何保持先进性"成为考题。三个代表回答的是"建设什么样的党·怎样建设党"这一根本问题。'},
    {topic:'三个代表的逻辑结构',reply:'"代表先进生产力发展要求"（物质基础·执政合法性）+ "代表先进文化前进方向"（意识形态·凝聚力）+ "代表最广大人民根本利益"（价值立场·人民性）——三者有机统一、缺一不可。核心内容：立党为公、执政为民。不是并列三条原则，而是一个整体。'}
],
P7:[
    {topic:'科学发展观诞生于 SARS 之后',reply:'2003 年 SARS 疫情暴露了公共卫生短板；同期环境恶化、城乡差距扩大、GDP 主义受质疑。十六届三中全会（2003·10）胡锦涛首次提出"科学发展观"——2007 年十七大写入党章，2012 年十八大确立为党的指导思想。这是"发展"概念的一次深刻反思。'},
    {topic:'四要素与记忆口诀',reply:'第一要义·发展 / 核心立场·以人为本 / 基本要求·全面协调可持续 / 根本方法·统筹兼顾。口诀："要义发展人本立场·协调基本统筹兼顾"。真题陷阱：把"以人为本"放进"第一要义"位置——错！以人为本是核心立场。'}
],
P8:[
    {topic:'"中国梦"最早在哪里说出？',reply:'2012·11·29 习近平在国家博物馆参观《复兴之路》展览时首次提出——"实现中华民族伟大复兴，就是中华民族近代以来最伟大的梦想"。2013 年十二届全国人大闭幕式上进一步阐述。2017 十九大写入党章、2018 修宪写入宪法。'},
    {topic:'"两个确立·两个维护·两个结合"',reply:'两个确立（2021 六中全会）：确立习核心地位·确立习思想指导地位。两个维护：维护习核心·维护党中央权威和集中统一领导。两个结合（二十大）：马与中国具体实际结合·马与中华优秀传统文化结合。这"六个二"是 2022 年以来命题核心。'}
],
P9:[
    {topic:'"五位一体"是怎么变成"五位"的',reply:'十二大（1982）只讲"物质文明 + 精神文明"两位；十三大加"政治文明"三位；十七大加"社会建设"成四位；十八大（2012）首次把"生态文明建设"加入——形成经济 / 政治 / 文化 / 社会 / 生态"五位一体"总体布局。这部分真题常考"新增的一项是哪个"——生态文明建设。'},
    {topic:'别混淆：总体布局 ≠ 战略布局',reply:'总体布局 = 五位一体（经政文社生）；战略布局 = 四个全面（小康·改革·法治·治党）。一个是"五大领域"，一个是"四大抓手"——两个层面、互补协调。考研选择题常故意混用——先记口诀："五位布局·四个全面"。'}
],
P10:[
    {topic:'入党誓词 80 字·1982 年定稿',reply:'十二大（1982）正式确定入党誓词 80 字——"我志愿加入中国共产党·拥护党的纲领·遵守党的章程·履行党员义务·执行党的决定·严守党的纪律·保守党的秘密·对党忠诚·积极工作·为共产主义奋斗终身·随时准备为党和人民牺牲一切·永不叛党"。口诀："拥遵履执严守·忠积奋牺叛"。'},
    {topic:'新时代党建 · 六大建设 + 制度贯穿',reply:'十九大新时代党建总要求——政治（灵魂）、思想（基础）、组织（保证）、作风（形象）、纪律（准绳）、反腐败斗争——加上"制度建设贯穿其中"。全面从严治党——"全面"二字意味着覆盖所有党员/组织/领域。考点："从严治党 ≠ 全面从严治党"。'}
],
H1:[
    {topic:'虎门销烟不是鸦片战争的真正原因',reply:'1839.6.3-25 林则徐虎门销烟 237 万斤——英国借此发兵，但真正原因是"贸易逆差 + 鸦片利益 + 打开中国市场"。1840.6 英国舰队驶入珠江口——鸦片战争爆发。1842.8.29《南京条约》在英舰"皋华丽号"上签订。'},
    {topic:'《南京条约》的"制度性伤害"',reply:'除了 2100 万银元赔款、割香港岛（不是整个香港！）、开五口（广厦福宁沪）——最致命的是新出现的三大"制度性伤害"：协定关税（自主关税权丧失）、领事裁判权（司法主权丧失）、片面最惠国待遇（国际地位不平等）。这才是"半殖民地"的起点。'}
],
H2:[
    {topic:'圆明园之火·英军主谋·法军同谋',reply:'1860·10·6 英法联军占圆明园，10·18-19 英军在额尔金授意下放火三天三夜。理由——"惩罚"清政府。法军虽未直接纵火但参与抢劫。雨果 1861 年写信怒斥："两个强盗闯进圆明园……一个叫法兰西·一个叫英吉利。"'},
    {topic:'俄国是第二次鸦片战争"最大赢家"',reply:'英法流血打仗，俄国"不动一兵一卒"充当"调停人"——借机逼清政府签《瑷珲条约》（1858）割走外东北 60 万平方公里；《北京条约》（1860）再割乌苏里江以东 40 万平方公里——共 100 万平方公里，相当于三个法国。考研常考"近代中国割地最多的是哪个条约"——瑷珲 + 北京条约对俄。'}
],
H3:[
    {topic:'"中体西用"是张之洞的妥协',reply:'"中学为体·西学为用"——1898 年张之洞《劝学篇》集大成。表面上在说"学西方技术但保中国礼教"；深层是在守旧派与维新派之间求平衡。问题：体用不能二分——洋务运动失败的深层原因就是"制度未改·技术只能有限"。'},
    {topic:'甲午战败宣告洋务运动破产',reply:'1894-1895 中日甲午战争——北洋水师全军覆没（致远舰邓世昌、经远舰林永升、威海卫丁汝昌自杀殉国）。洋务运动 30 年的"自强求富"招牌在 1895 年 4·17《马关条约》前彻底垮塌——赔款 2 亿两、割台湾澎湖、开沙市重庆苏州杭州。此后中国进入"瓜分狂潮"。'}
],
H4:[
    {topic:'戊戌六君子·谭嗣同的选择',reply:'戊戌六君子：谭嗣同、康广仁（康有为弟）、林旭、杨深秀、杨锐、刘光第——1898·9·28 北京菜市口就义。谭嗣同本可逃走：王五劝他、日本使馆愿保他，他选择留下："各国变法无不从流血而成，今中国未闻有因变法而流血者·此国之所以不昌也。有之·请自嗣同始！"'},
    {topic:'戊戌变法失败的根本原因',reply:'103 天变法（1898·6·11-9·21）没有发动群众·只依靠一个没有实权的光绪皇帝。资产阶级维新派人数极少（康梁谭林杨等不过几十人）·既怕革命又想改良——注定失败。考研易错："戊戌变法是资产阶级革命"——错！是改良。改良与革命的分水岭在"要不要推翻清政府"。'}
],
H5:[
    {topic:'辛丑条约的"人均一两"侮辱',reply:'1901·9·7《辛丑条约》——赔款 4.5 亿两白银（当时中国人口 4.5 亿·每人一两的"侮辱性设计"），分 39 年还清、年息四厘、本息共计 9.8 亿两，以关税盐税作抵押。这是人类条约史上最羞辱的赔款方式之一。'},
    {topic:'清政府沦为"洋人的朝廷"',reply:'《辛丑条约》最大危害——清政府彻底沦为列强统治中国的工具·中国完全沦为半殖民地半封建社会。"东南互保"事件——李鸿章·张之洞·刘坤一拒不执行慈禧的"宣战诏书"——意味着中央权威瓦解、督抚事实上成为半独立的封疆大吏。辛亥革命的温床在此时已埋下。'}
],
H6:[
    {topic:'武昌起义·熊秉坤的第一枪',reply:'1911·10·10 晚·武昌新军工程第八营·熊秉坤打响第一枪（金兆龙也有一说）。两个月内全国 14 省独立。1912·1·1 孙中山南京就任临时大总统——这是中国第一个资产阶级共和国。'},
    {topic:'辛亥革命的胜利与局限',reply:'胜利：推翻两千多年封建帝制——这是制度性突破。局限：① 没改变半殖民地半封建社会性质；② 没提出反帝纲领；③ 没发动广大工农群众；④ 革命果实被袁世凯篡夺（1912·2·12 清帝逊位 → 3·10 袁世凯北京就任临时大总统）。"虚君共和"变成"北洋军阀独裁"。'}
],
H7:[
    {topic:'五四运动是新民主主义革命开端',reply:'1919·5·4 北京 3000 学生抗议巴黎和会"山东问题"——为什么是"新民主主义"开端？关键标志：工人阶级登上政治舞台（6·3 上海工人大罢工声援学生）。此前是"旧民主主义"（资产阶级领导）——自此中国革命由资产阶级领导转为无产阶级领导。'},
    {topic:'一大 13 代表的命运',reply:'13 位代表：毛泽东、董必武、陈潭秋、何叔衡、王尽美、邓恩铭、李达、李汉俊、张国焘、刘仁静、周佛海、陈公博、包惠僧。后来 6 人叛变或脱党，5 人牺牲或病逝，仅毛泽东、董必武 2 人走到开国大典。陈独秀、李大钊"南陈北李"因事未到。真题易错：周恩来·朱德·刘少奇都没参加一大！'}
],
H8:[
    {topic:'黄埔军校·国共合作的蜜月期',reply:'1924·5·5 黄埔军校在广州创立——孙中山总理、蒋介石校长、廖仲恺党代表、周恩来政治部主任（第三任）。校门对联："升官发财请往他处·贪生怕死勿入斯门"。前六期培养 1.5 万学员——国共两党军事骨干大半在此。'},
    {topic:'大革命失败·陈独秀右倾机会主义',reply:'1927·4·12 上海蒋介石反革命政变（杀害赵世炎·陈延年等）；7·15 武汉汪精卫"分共"——大革命失败。主观原因：陈独秀右倾机会主义错误——放弃无产阶级对革命的领导权（不要军队、不要土地革命、无原则妥协）。客观原因：国民党右派叛变 + 共产国际指导失误。教训："没有军队的政党就没有地位"。'}
],
H9:[
    {topic:'井冈山"三湾改编"的关键创举',reply:'1927·9 秋收起义失败后·毛泽东率部向井冈山转移。9 月底"三湾改编"——把"支部建在连上"（党指挥枪）、建立士兵委员会（官兵平等）、实行民主制度（三大纪律八项注意雏形）。这是新型人民军队的开端——没有三湾改编就没有井冈山胜利。'},
    {topic:'遵义会议解决的"两个问题"',reply:'1935·1·15-17 遵义会议——解决了军事和组织问题：① 批判博古·李德军事路线错误；② 事实上确立毛泽东在党和红军中的领导地位。但没解决"政治路线"（那个要到 1945 七大解决·历史决议）；也没解决"思想路线"（要到延安整风解决）。考研易错："遵义会议确立了毛泽东思想"——错！思想的确立要到七大。'}
],
H10:[

function renderStage(){
    const s=state.stage;
    if(s==='title') renderTitle();
    else if(s==='prologue') renderPrologue();
    else if(s==='sandbox') renderSandbox();
    else if(s==='zone') renderZone();
    else if(s==='room') renderRoom();
    else if(s==='deduction') renderDeduction();
    else if(s==='finale') renderFinale();
    else if(s==='ending') renderEnding();
    applyBgm();
}

    {emoji:'📓',n:'旁白',speech:'（翻开馆长递来的手账本，首页烫金"藏心·求真"——翻到最后一页，却有一行非馆长笔迹：「馆长也可能说谎。请你们，带着怀疑，出发。」）'}
];

function prologueNext(){state.flags.prologueStep++;sfxSelect();renderStage()}

function renderSandbox(){
    const completedZones=Object.keys(ZONES).filter(z=>{
        const n=ZONES[z].count;let done=0;
        for(let i=1;i<=n;i++) if(state.visited[z+i]) done++;
        return done===n;
    });
    const allDone=completedZones.length===5;
    document.getElementById('stage').innerHTML=`
    <div class="header-bar">
        <div class="mini-logo">沙 盒 · 5 大 展 区</div>
        <div class="progress-bar">第 ${Math.min(completedZones.length+1,5)} 幕 / 5</div>
    </div>
    <div class="sandbox">
        <div class="sandbox-title">归档处 · 全景地图</div>
        <div class="sandbox-sub">选择任意展区进入 · 收集 44 枚徽章 · 解锁终章</div>
        <div class="zones">
            ${Object.keys(ZONES).map(z=>{
                const zn=ZONES[z];let done=0;
                for(let i=1;i<=zn.count;i++) if(state.visited[z+i]) done++;
                const cls=done===zn.count?'zone done':'zone';
                return `<div class="${cls}" role="button" tabindex="0" data-kbd onclick="enterZone('${z}')" aria-label="进入 ${zn.name} 展区，${done}/${zn.count} 徽章">
                    <span class="zone-icon" aria-hidden="true">${zn.icon}</span>
                    <div class="zone-name">${zn.name}</div>
                    <div class="zone-npc">${zn.npc}</div>
                    <div class="zone-progress">${zn.mod} · ${done}/${zn.count} 徽章</div>
                </div>`;
            }).join('')}
        </div>
        ${allDone?`<div style="text-align:center;margin-top:50px;animation:glowPulse 2s infinite">
            ${state.deduction?`<button class="btn-primary" onclick="enterFinale()" style="font-size:22px;padding:18px 70px">☆ 终 章 · 馆 长 密 室 ☆</button>
            <div style="margin-top:15px;color:#d4af37;font-size:14px;letter-spacing:3px">推理厅已定稿 · 评级 ${computeGrade().rankLabel} · 馆长等你揭晓真相</div>`:`<button class="btn-primary" onclick="enterDeduction()" style="font-size:22px;padding:18px 70px">☆ 推 理 厅 · 拼 合 真 相 ☆</button>
            <div style="margin-top:15px;color:#d4af37;font-size:14px;letter-spacing:3px">44 徽章集齐 · 5 把主任之钥在手 · 先凭手账本回答 9 问，再进终章</div>`}
        </div>`:`<div class="system-msg">⚜ 剩余 ${5-completedZones.length} 大展区未通关 ⚜</div>`}
    </div>`;
}

function enterZone(z){state.currentZone=z;state.stage='zone';sfxSelect();renderStage()}

function renderZone(){
    const z=state.currentZone;const zn=ZONES[z];
    const rooms=[];
    for(let i=1;i<=zn.count;i++){
        const rid=z+i;const r=ROOMS[rid];
        const done=!!state.visited[rid];
        const prevDone=i===1||state.visited[z+(i-1)];
        rooms.push({rid,r,done,locked:!prevDone&&!done});
    }
    const allDone=rooms.every(x=>x.done);
    document.getElementById('stage').innerHTML=`
    <div class="header-bar">
        <div class="mini-logo">${zn.icon} ${zn.name} · ${zn.npc}</div>
        <button class="btn-ghost" onclick="state.stage='sandbox';renderStage()">← 返回沙盒</button>
    </div>
    <div class="sandbox-sub">${zn.mod} · 共 ${zn.count} 房间 · 按顺序解锁</div>
    <div class="room-list">
        ${rooms.map(x=>{
            const cls=x.done?'room-item done':(x.locked?'room-item locked':'room-item');
            const handler=x.locked?'':`onclick="enterRoom('${x.rid}')"`;
            const status=x.done?'✓':(x.locked?'🔒':'→');
            const aria=`${x.rid} ${x.r.title}，${x.done?'已完成':(x.locked?'未解锁':'未完成')}`;
            return `<div class="${cls}" role="button" tabindex="${x.locked?-1:0}" ${x.locked?'aria-disabled="true"':'data-kbd'} ${handler} aria-label="${aria}">
                <div class="room-label">
                    <div class="room-title-txt">${x.rid} · ${x.r.title}</div>
                    <div class="room-ch">${x.r.ch}</div>
                </div>
                <div class="room-status" aria-hidden="true">${status}</div>
            </div>`;
        }).join('')}
    </div>
    ${allDone?`<div style="text-align:center;margin-top:30px">
        <div class="clue-popup">
            <div class="clue-popup-title">★ ${zn.name} 已通关</div>
            <div class="clue-popup-text">你获得了 <strong style="color:#d4af37">${zn.key}</strong> —— 这是打开终章重铸炉的 5 把钥匙之一。</div>
        </div>
    </div>`:''}`;
}

function enterRoom(rid){
    state.currentRoom=rid;state.stage='room';
    state.flags.attempts=0;state.flags.roomStep='intro';
    state.flags.puzzleState={};
    sfxSelect();renderStage();
}

            </div>
            <div class="guardian-speech">${r.guardian.speech}</div>
        </div>
        <div style="text-align:center;margin-top:30px">
            ${hasTeach?`<button class="btn-teaching" onclick="roomNext('learn')">先 · 听 我 讲 这 个 知 识 点</button><br><button class="btn-ghost" style="margin-top:10px" onclick="roomNext('puzzle')">（直接挑战）</button>`:`<button class="btn-primary" onclick="roomNext('puzzle')">接 受 试 炼</button>`}

            <div class="teaching-body">${bodyHtml}</div>
            ${tm.core?`<div class="teaching-core">${tm.core}</div>`:''}
        </div>
        <div style="text-align:center;margin-top:30px">
            <button class="btn-primary" onclick="roomNext('puzzle')">现 在 · 我 理 解 了 → 接 受 试 炼</button>

    }else if(step==='puzzle'){
        content=renderPuzzle(r);
    }else if(step==='after'){

        <div class="scene-title">${r.title} · 真 相</div>

        <div class="clue-popup">
            <div class="clue-popup-title">✦ 获得徽章</div>
            <div class="clue-popup-text">🎖 <strong style="color:#d4af37">${r.badge}</strong> 已收入手账本。</div>
        </div>
        ${r.clue?`<div class="clue-popup">
            <div class="clue-popup-title">✧ 线索发现</div>
            <div class="clue-popup-text">${r.clue}</div>
        </div>`:''}
        ${fus.length?`<div class="followup-box">
            <div class="followup-label">🔎 深入一问 · 与${r.guardian.name}再聊几句</div>
            <div class="followup-topics">
                ${fus.map((fu,i)=>{const isStory=fu.topic.indexOf('🎬')===0;return `<button class="btn-topic" id="topic-${i}" ${isStory?'data-story="1"':''} onclick="askFollowup(${i})">${isStory?'':'· '}${fu.topic}</button>`}).join('')}
            </div>
            <div class="followup-display" id="followup-display"></div>

    <div class="header-bar">

}

function roomNext(next){state.flags.roomStep=next;state.flags.puzzleState={};renderStage()}

// ============ 谜题渲染 (支持 5 种类型) ============
function renderPuzzle(r){
    const p=r.puzzle;
    const attempts=state.flags.attempts||0;
    let ui='';
    if(p.type==='fill'){
        ui=`
        <div class="puzzle-q">${p.q.replace(/\n/g,'<br>')}</div>
        <input type="text" class="puzzle-input" id="user-answer" placeholder="输入你的答案..." onkeydown="if(event.key==='Enter')submitFill()">
        ${p.hint?`<div class="puzzle-hint">💡 提示：${p.hint}</div>`:''}
        <div style="margin-top:15px;text-align:right">
            <button class="btn-ghost" onclick="submitFill()">提 交 答 案</button>
        </div>`;
    }else if(p.type==='choice'){
        ui=`
        <div class="puzzle-q">${p.q.replace(/\n/g,'<br>')}</div>
        <div>${p.options.map((o,i)=>`<button class="btn-choice" onclick="submitChoice(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
        ${p.hint?`<div class="puzzle-hint">💡 提示：${p.hint}</div>`:''}`;
    }else if(p.type==='multifill'){
        const vals=state.flags.puzzleState.vals||p.fields.map(()=>'');
        ui=`
        <div class="puzzle-q">${p.q.replace(/\n/g,'<br>')}</div>
        <div class="multi-fill-grid">
            ${p.fields.map((f,i)=>`
                <div class="multi-fill-label">${f.label}</div>
                <input type="text" class="puzzle-input" id="mf-${i}" value="${vals[i]}" placeholder="...">
            `).join('')}
        </div>
        ${p.hint?`<div class="puzzle-hint">💡 提示：${p.hint}</div>`:''}
        <div style="margin-top:15px;text-align:right">
            <button class="btn-ghost" onclick="submitMultifill()">提 交 答 案</button>
        </div>`;
    }else if(p.type==='multi'){
        if(!state.flags.puzzleState.sel) state.flags.puzzleState.sel=[];
        const sel=state.flags.puzzleState.sel;
        ui=`
        <div class="puzzle-q">${p.q.replace(/\n/g,'<br>')}</div>
        <div class="multi-opts">
            ${p.options.map((o,i)=>`
                <div class="multi-opt ${sel.includes(i)?'checked':''}" onclick="toggleMulti(${i})">
                    <div class="multi-check">${sel.includes(i)?'✓':''}</div>
                    <div>${o}</div>
                </div>
            `).join('')}
        </div>
        ${p.hint?`<div class="puzzle-hint">💡 提示：${p.hint}</div>`:''}
        <div style="margin-top:15px;text-align:right">
            <button class="btn-ghost" onclick="submitMulti()">提 交 答 案 (已选 ${sel.length} 项)</button>
        </div>`;
    }else if(p.type==='order'){
        if(!state.flags.puzzleState.order){
            // 初始化为乱序
            const n=p.items.length;
            const arr=Array.from({length:n},(_,i)=>i);
            for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
            // 确保不是正序
            if(arr.every((v,i)=>v===i)) {[arr[0],arr[1]]=[arr[1],arr[0]]}
            state.flags.puzzleState.order=arr;
            state.flags.puzzleState.sel=-1;
        }
        const order=state.flags.puzzleState.order;
        const selIdx=state.flags.puzzleState.sel;
        ui=`
        <div class="puzzle-q">${p.q.replace(/\n/g,'<br>')}</div>
        <div style="color:#888;font-size:14px;margin-bottom:10px">💡 点击两项可交换位置（第一次点击选中，第二次点击交换）</div>
        <ul class="order-list">
            ${order.map((itemIdx,pos)=>`
                <li class="order-item ${selIdx===pos?'selected':''}" onclick="orderClick(${pos})">
                    <span class="order-num">${pos+1}</span>
                    <span>${p.items[itemIdx]}</span>
                </li>
            `).join('')}
        </ul>
        ${p.hint?`<div class="puzzle-hint">💡 提示：${p.hint}</div>`:''}
        <div style="margin-top:15px;text-align:right">
            <button class="btn-ghost" onclick="submitOrder()">提 交 答 案</button>
        </div>`;
    }else if(p.type==='match'){
        if(!state.flags.puzzleState.pairs){
            state.flags.puzzleState.pairs=[];
            state.flags.puzzleState.activeL=-1;
            // 右侧乱序
            const n=p.right.length;const arr=Array.from({length:n},(_,i)=>i);
            for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}
            state.flags.puzzleState.rightOrder=arr;
        }
        const ps=state.flags.puzzleState.pairs;
        const actL=state.flags.puzzleState.activeL;
        const rOrd=state.flags.puzzleState.rightOrder;
        const leftUsed=ps.map(x=>x[0]);
        const rightUsed=ps.map(x=>x[1]);
        ui=`
        <div class="puzzle-q">${p.q.replace(/\n/g,'<br>')}</div>
        <div style="color:#888;font-size:14px;margin-bottom:10px">💡 依次点击左侧一项和右侧一项进行配对（已配对的项不可重复选择）</div>
        <div class="match-board">
            <div class="match-col">
                ${p.left.map((t,i)=>{
                    let cls='match-cell';
                    if(leftUsed.includes(i))cls+=' paired';
                    else if(actL===i)cls+=' active';
                    return `<div class="${cls}" onclick="matchClickL(${i})">${t}</div>`;
                }).join('')}
            </div>
            <div class="match-col" style="gap:8px;justify-content:space-around">
                ${p.left.map((_,i)=>{
                    const paired=ps.find(x=>x[0]===i);
                    return `<div style="height:48px;display:flex;align-items:center;justify-content:center;color:#d4af37;font-size:18px">${paired?'↔':'—'}</div>`;
                }).join('')}
            </div>
            <div class="match-col">
                ${rOrd.map(i=>{
                    const t=p.right[i];
                    let cls='match-cell';
                    if(rightUsed.includes(i))cls+=' paired';
                    return `<div class="${cls}" onclick="matchClickR(${i})">${t}</div>`;
                }).join('')}
            </div>
        </div>
        ${p.hint?`<div class="puzzle-hint">💡 提示：${p.hint}</div>`:''}
        <div style="margin-top:15px;text-align:right">
            <button class="btn-ghost" onclick="resetMatch()" style="color:#ff6666;border-color:#ff6666">清 空</button>
            <button class="btn-ghost" onclick="submitMatch()">提 交 (${ps.length}/${p.left.length})</button>
        </div>`;
    }
    return `
    <div class="scene-title">${r.title} · 试 炼</div>
    <div class="scene-meta">${ZONES[r.zone].name} · ${r.ch}</div>
    <div class="puzzle">
        <div class="puzzle-label">◆ 机 关 谜 题</div>
        ${ui}
        <div class="attempt-counter">已尝试 ${attempts}/3</div>
        <div id="puzzle-fb"></div>
    </div>`;
}

// ============ 各类谜题提交 ============
function submitFill(){
    const inp=document.getElementById('user-answer');const v=inp.value.trim();
    if(!v)return;sfxClick();
    const r=ROOMS[state.currentRoom];const ok=checkFill(r.puzzle,v);
    handleResult(ok,r.puzzle.a[0]);
}
function submitChoice(idx){
    sfxClick();const r=ROOMS[state.currentRoom];const ok=idx===r.puzzle.correct;
    const ans=String.fromCharCode(65+r.puzzle.correct)+'. '+r.puzzle.options[r.puzzle.correct];
    handleResult(ok,ans);
}
function submitMultifill(){
    sfxClick();const r=ROOMS[state.currentRoom];const p=r.puzzle;
    const vals=p.fields.map((f,i)=>document.getElementById('mf-'+i).value.trim());
    state.flags.puzzleState.vals=vals;
    let allOk=true;
    for(let i=0;i<p.fields.length;i++){
        const u=normalize(vals[i]);
        const ok=p.fields[i].a.some(a=>{const na=normalize(a);return na===u||u.indexOf(na)>=0||(na.indexOf(u)>=0&&u.length>=1)});
        if(!ok){allOk=false;break}
    }
    const refAns=p.fields.map(f=>f.a[0]).join(' / ');
    handleResult(allOk,refAns);
}
function toggleMulti(i){
    sfxClick();
    if(!state.flags.puzzleState.sel) state.flags.puzzleState.sel=[];
    const s=state.flags.puzzleState.sel;
    const k=s.indexOf(i);
    if(k>=0) s.splice(k,1); else s.push(i);
    renderStage();
}
function submitMulti(){
    sfxClick();const r=ROOMS[state.currentRoom];const p=r.puzzle;
    const sel=state.flags.puzzleState.sel||[];
    const correct=p.correct.slice().sort((a,b)=>a-b);
    const userSel=sel.slice().sort((a,b)=>a-b);
    const ok=correct.length===userSel.length&&correct.every((v,i)=>v===userSel[i]);
    const refAns=correct.map(i=>p.options[i]).join('、');
    handleResult(ok,refAns);
}
function orderClick(pos){
    sfxClick();
    const ps=state.flags.puzzleState;
    if(ps.sel===-1||ps.sel===undefined){ps.sel=pos}
    else if(ps.sel===pos){ps.sel=-1}
    else{
        const a=ps.order;[a[ps.sel],a[pos]]=[a[pos],a[ps.sel]];
        ps.sel=-1;
    }
    renderStage();
}
function submitOrder(){
    sfxClick();const r=ROOMS[state.currentRoom];const p=r.puzzle;
    const order=state.flags.puzzleState.order;
    const ok=order.every((v,i)=>v===p.correct[i]);
    const refAns=p.correct.map(i=>p.items[i]).join(' → ');
    handleResult(ok,refAns);
}
function matchClickL(i){
    sfxClick();const ps=state.flags.puzzleState;
    if(ps.pairs.some(x=>x[0]===i))return;
    ps.activeL=(ps.activeL===i?-1:i);renderStage();
}
function matchClickR(i){
    sfxClick();const ps=state.flags.puzzleState;
    if(ps.pairs.some(x=>x[1]===i))return;
    if(ps.activeL<0){showToast('请先点击左侧一项');return}
    ps.pairs.push([ps.activeL,i]);ps.activeL=-1;renderStage();
}
function resetMatch(){
    state.flags.puzzleState.pairs=[];state.flags.puzzleState.activeL=-1;renderStage();
}
function submitMatch(){
    sfxClick();const r=ROOMS[state.currentRoom];const p=r.puzzle;
    const ps=state.flags.puzzleState.pairs||[];
    if(ps.length!==p.left.length){showToast('请完成所有配对');return}
    const mk=ps.slice().sort((a,b)=>a[0]-b[0]);
    const ck=p.pairs.slice().sort((a,b)=>a[0]-b[0]);
    const ok=mk.every((x,i)=>x[0]===ck[i][0]&&x[1]===ck[i][1]);
    const refAns=p.pairs.map(x=>`${p.left[x[0]]} ↔ ${p.right[x[1]]}`).join('；');
    handleResult(ok,refAns);
}

function handleResult(ok,refAns){
    state.flags.attempts=(state.flags.attempts||0)+1;
    const fb=document.getElementById('puzzle-fb');
    if(!fb)return;
    if(ok){
        sfxCorrect();
        if(state.flags.attempts===1 && !state.visited[state.currentRoom]){
            state.puzzleFirstTry[state.currentRoom]=true;
        }
        fb.innerHTML=`<div class="puzzle-feedback pf-right">✓ 回答正确！守护灵向你颔首。${state.flags.attempts===1?'<br><span style="color:#d4af37">★ 首答即中 · 加分</span>':''}</div>`;
        setTimeout(()=>awardRoom(),1300);
    }else if(state.flags.attempts>=3){
        sfxWrong();
        fb.innerHTML=`<div class="puzzle-feedback pf-hint">⚠ 三次已竭尽。参考答案：<strong>${refAns}</strong>。守护灵叹息——此次暂且放你们一马。</div>`;
        setTimeout(()=>awardRoom(),2800);
    }else{
        sfxWrong();

function submitDeduction(){
    const ans=state.flags.dedAns||{};
    const results=DEDUCTION_QS.map(q=>{
        const a=ans[q.id];let ok=false;let userText='';let refText='';
        if(q.type==='choice'){
            ok=(a===q.correct);
            userText=(a!==undefined&&a>=0)?q.options[a]:'（未作答）';
            refText=q.options[q.correct];
        }else if(q.type==='multi'){
            const userSel=(Array.isArray(a)?a:[]).slice().sort((x,y)=>x-y);
            const cor=q.correct.slice().sort((x,y)=>x-y);
            ok=userSel.length===cor.length&&userSel.every((v,i)=>v===cor[i]);
            userText=userSel.length?userSel.map(i=>q.options[i]).join('、'):'（未作答）';
            refText=cor.map(i=>q.options[i]).join('、');
        }else if(q.type==='fill'){
            const u=normalize(a);
            ok=u.length>0&&q.a.some(x=>{const nx=normalize(x);return nx===u||u.indexOf(nx)>=0||(nx.indexOf(u)>=0&&u.length>=3)});
            userText=(a||'').trim()||'（未作答）';
            refText=q.a[0];
        }
        return {id:q.id,q:q.q,ok,userText,refText};
    });
    const correctCount=results.filter(r=>r.ok).length;
    state.deduction={answers:ans,results,correctCount,total:DEDUCTION_QS.length,submittedAt:new Date().toISOString()};
    sfxBadge();saveGame(true);renderSidebar();
    // 先展示推理回顾页，再进终章
    state.flags.dedReviewShown=true;
    renderDeductionReview();
}

function computeGrade(){
    const total44=44;
    const firstTryCount=Object.keys(state.puzzleFirstTry||{}).length;
    const firstTryPts=(firstTryCount/total44)*30;
    let clueTotal=0;Object.keys(ROOMS).forEach(rid=>{if(ROOMS[rid].clue)clueTotal++});
    const clueCount=(state.clues||[]).length;
    const cluePts=clueTotal?(clueCount/clueTotal)*10:0;
    const d=state.deduction;
    const deductionPts=d?(d.correctCount/d.total)*60:0;
    const total=firstTryPts+cluePts+deductionPts;
    let rank,rankLabel,rankDesc;
    if(total>=90){rank='S';rankLabel='特等研究员';rankDesc='真相侦破·知识归位·拟颁发印刷版红宝书周边。'}
    else if(total>=75){rank='A';rankLabel='一等研究员';rankDesc='推理精密·知识扎实·可进入 101 阅卷组实习名单。'}
    else if(total>=60){rank='B';rankLabel='二等研究员';rankDesc='主线已通·细节待补·建议二刷时政专题。'}
    else if(total>=45){rank='C';rankLabel='三等研究员';rankDesc='真相探到边缘·若干关键线索未串联。'}
    else{rank='D';rankLabel='返聘见习';rankDesc='建议结合手账本线索回炉再战。下届考研季再见。'}
    return {total,rank,rankLabel,rankDesc,firstTryCount,firstTryPts,clueCount,clueTotal,cluePts,deductionPts};
}

function chooseEnding(e){state.ending=e;state.stage='ending';sfxDoor();saveGame(true);renderStage()}

function renderEnding(){
    const e=state.ending;
    const endings={
        A:{t:'结局 A · 守护者',c:`红宝书重铸完成，原封不动被放回金柜。5 位主任眼中闪过失望与理解交织的复杂神色。<br><br>馆长轻叹："你们让它——又回去了。也许你们没准备好。没关系，再等下一届。"<br><br>你们获得"守护者"称号。密室灯光一盏一盏熄灭——馆长消失了。<br><br>金柜依旧锁着。红宝书依旧是金箔。<br><br>走出归档处，清晨雨停了。燕园的青草被阳光照亮，但你们心里隐隐不安——这把锁，是否只是在等待下一次被熔化？`,q:'知识藏于金柜，等待下一次觉醒。'},
        B:{t:'结局 B · 传火者',c:`红宝书化为金粉与光，散向四面八方。44 枚徽章各自进入你们的手账本——每一页都显出金色的字。<br><br>馆长沈藏心露出了你们见过的第一个笑："你们——做了我 27 年前想做而没做的事。从今天起，红宝书不再属于金柜，属于每一个翻开它的人。"<br><br>她走到你们中间，问："谁愿意接任下一任馆长？"<br><br>你们沉默，看彼此。最年轻的那位研究员，轻轻举起了手。<br><br>馆长把金箔的最后一片碎屑，放进那位研究员的手心——碎屑融入皮肤，消失不见。<br><br>雨停了。燕园的晨光铺满你们的肩。你们翻开手账本，看见新多的一行字——是你们自己的笔迹，却不记得写过：`,q:'红宝书在我这里。我就是红宝书。',best:true},
        C:{t:'结局 C · 辩证者',c:`红宝书铸成一枚拇指大的红玺——同时向外流出 101 份副本，发向归档处所有藏室。<br><br>馆长温和："你们选了一条最难的路——既要有权威的核心，也要有普惠的枝叶。这就是中国式现代化的思维方式。"<br><br>她向你们深深一鞠躬——5 位主任也同步鞠躬。<br><br>红玺被锁进一座微型金柜，但金柜的钥匙每年轮换到下一代研究员手中。副本则在 101 阅卷组所有教员之间流转——每人每年轮读一章，写一份读后感。<br><br>矛盾统一，对立共存。<br><br>雨停了。你们离开归档处，心里明白——这就是辩证法最朴素的样子：权威与普惠同时存在，它们在时间里螺旋上升。`,q:'权威与普惠，对立统一。'}
    };
    const end=endings[e];
    const grade=computeGrade();
    document.getElementById('stage').innerHTML=`
    <div class="ending-screen">
        <h1>${end.t}</h1>
        <p>${end.c}</p>
        <div class="final-quote">「${end.q}」</div>
        ${end.best?`<div style="color:#d4af37;text-align:center;font-size:15px;letter-spacing:4px;margin-bottom:30px">★ 制作组推荐结局 ★</div>`:''}
        <div class="clue-popup" style="max-width:640px;margin:30px auto;text-align:center">
            <div class="clue-popup-title">★ 结业评级 · 阅 卷 组 归 档 处</div>
            <div style="color:#d4af37;font-size:42px;font-family:'STKaiti',serif;letter-spacing:8px;margin:20px 0;text-shadow:0 0 20px #d4af37">${grade.rankLabel}</div>
            <div style="color:#e8d7b0;font-size:14px;line-height:1.9">
                推理：${state.deduction?state.deduction.correctCount:0}/${DEDUCTION_QS.length}（${grade.deductionPts.toFixed(1)}/60）<br>
                谜题首答：${grade.firstTryCount}/44（${grade.firstTryPts.toFixed(1)}/30）<br>
                线索：${grade.clueCount}/${grade.clueTotal}（${grade.cluePts.toFixed(1)}/10）<br>
                <strong style="color:#d4af37;font-size:18px">总分 ${grade.total.toFixed(1)} / 100</strong>
            </div>
            <div style="color:#b8a87a;font-style:italic;margin-top:15px;font-size:13px">${grade.rankDesc}</div>
        </div>
        <div class="narration" style="margin-top:40px">
            <strong>尾声 · 雨停了</strong><br><br>
            清晨 6:00，雨停了。<br>
            你们手账本上 44 枚徽章金光流转。<br><br>
            5 位主任依次走过——<br>
            <em>老马："矛盾不会消失，它只会升华。"</em><br>
            <em>老毛："没有调查就没有发言权——今天你们发言了。"</em><br>
            <em>老史："1840 到 2026，快 200 年了。"</em><br>
            <em>老思："德与法，在你们心里——平衡了。"</em><br>
            <em>小时："下一个五年的红宝书，我们见。"</em><br><br>
            馆长远远挥手。金字门牌在阳光下闪了一下：<strong style="color:#d4af37;font-family:'STKaiti',serif;letter-spacing:3px">"101·藏心·求真"</strong>
        </div>
        <div style="text-align:center;margin-top:40px">
            <button class="btn-primary" onclick="exportPDF()">📄 导出通关纪念册 PDF</button>
            <button class="btn-ghost" onclick="resetGame()" style="margin-left:10px">重新开始 · 探索其他结局</button>
            <div style="margin-top:15px;color:#888;font-size:13px;letter-spacing:2px">徽章收集：${state.badges.length}/44 · 线索：${state.clues.length} · 通关结局：${e}</div>
        </div>
    </div>`;
    if(end.best) sfxBadge();
}

// ============ PDF 导出 ============
function exportPDF(){
    buildPrintSheet();
    setTimeout(()=>window.print(),300);
}
function buildPrintSheet(){
    const ps=document.getElementById('print-sheet');
    const date=state.startDate?new Date(state.startDate):new Date();
    const endDate=new Date();
    const endingText={A:'守护者',B:'传火者 ★',C:'辩证者'}[state.ending]||'调查进行中';
    const endQuote={A:'知识藏于金柜，等待下一次觉醒。',B:'红宝书在我这里。我就是红宝书。',C:'权威与普惠，对立统一。'}[state.ending]||'';
    let html='';

    const grade=computeGrade();
    // 封面
    html+=`<div class="print-page">
        <div class="print-cover-logo">101·藏心·求真</div>
        <div class="print-cover-sub">失 窃 档 案 · 红 宝 书 之 谜</div>
        <div class="print-cover-title">通 关 纪 念 册</div>
        <div class="print-cover-ending">结 局 · ${endingText} · ${grade.rankLabel}</div>
        <div class="print-cover-date">
        起始：${date.toLocaleDateString('zh-CN')} &nbsp;·&nbsp; 归档：${endDate.toLocaleDateString('zh-CN')}<br>
        徽章收集：${state.badges.length} / 44 &nbsp;·&nbsp; 主任之钥：${state.keys.length} / 5 &nbsp;·&nbsp; 线索：${state.clues.length}<br>
        综合评分：${grade.total.toFixed(1)} / 100
        </div>
    </div>`;

    // 评级与评卷页
    if(state.deduction){
        html+=`<div class="print-page">
            <div class="print-h2">◆ 结 业 评 级 · 阅 卷 组 签 发</div>
            <div style="text-align:center;margin:10mm 0">
                <div style="font-size:36pt;color:#8b0000;font-family:'STKaiti',serif;letter-spacing:8pt;margin:8mm 0">${grade.rankLabel}</div>
                <div style="font-size:13pt;color:#555;font-style:italic">${grade.rankDesc}</div>
            </div>
            <table style="width:100%;border-collapse:collapse;margin:10mm 0;font-size:11pt">
                <tr style="background:#fff4cc"><th style="padding:3mm;border:1pt solid #d4af37;text-align:left">评分项</th><th style="padding:3mm;border:1pt solid #d4af37">得分</th><th style="padding:3mm;border:1pt solid #d4af37">上限</th></tr>
                <tr><td style="padding:3mm;border:1pt solid #d4af37">推理厅 · ${state.deduction.correctCount}/${state.deduction.total} 命中</td><td style="padding:3mm;border:1pt solid #d4af37;text-align:center">${grade.deductionPts.toFixed(1)}</td><td style="padding:3mm;border:1pt solid #d4af37;text-align:center">60</td></tr>
                <tr><td style="padding:3mm;border:1pt solid #d4af37">谜题首答率 · ${grade.firstTryCount}/44 房</td><td style="padding:3mm;border:1pt solid #d4af37;text-align:center">${grade.firstTryPts.toFixed(1)}</td><td style="padding:3mm;border:1pt solid #d4af37;text-align:center">30</td></tr>
                <tr><td style="padding:3mm;border:1pt solid #d4af37">线索收集 · ${grade.clueCount}/${grade.clueTotal} 条</td><td style="padding:3mm;border:1pt solid #d4af37;text-align:center">${grade.cluePts.toFixed(1)}</td><td style="padding:3mm;border:1pt solid #d4af37;text-align:center">10</td></tr>
                <tr style="background:#fff4cc;font-weight:bold"><td style="padding:3mm;border:1.5pt solid #8b0000">总 分</td><td style="padding:3mm;border:1.5pt solid #8b0000;text-align:center;color:#8b0000">${grade.total.toFixed(1)}</td><td style="padding:3mm;border:1.5pt solid #8b0000;text-align:center">100</td></tr>
            </table>
            <div style="font-size:10pt;color:#666;margin-top:8mm;line-height:1.8">
                评级区间：特等研究员（≥90） · 一等（75-89） · 二等（60-74） · 三等（45-59） · 返聘见习（&lt;45）
            </div>
        </div>`;

        // 推理答卷
        html+=`<div class="print-page">
            <div class="print-h2">◆ 推 理 厅 答 卷 审 阅</div>
            <div style="margin-bottom:6mm;font-size:11pt;color:#666">9 道关键推理题 · 按手账本线索复盘真相</div>`;
        state.deduction.results.forEach((r,i)=>{
            const bg=r.ok?'#f0fff0':'#fff0f0';const bc=r.ok?'#30aa30':'#aa3030';
            html+=`<div style="background:${bg};border-left:3pt solid ${bc};padding:3mm 5mm;margin-bottom:3mm;font-size:10.5pt;line-height:1.7">
                <div style="font-size:9pt;color:${bc};letter-spacing:2pt;margin-bottom:2mm">${r.ok?'✓ 正确':'✗ 错误'} · 推理题 ${i+1}</div>
                <div style="color:#222;margin-bottom:2mm"><strong>${r.q}</strong></div>
                <div style="color:#555">你的答案：<span style="color:${bc}">${r.userText}</span></div>
                ${r.ok?'':`<div style="color:#555;margin-top:1mm">参考答案：<span style="color:#8b0000">${r.refText}</span></div>`}
            </div>`;
        });
        html+=`</div>`;
    }

    // 徽章收集页
    html+=`<div class="print-page">
        <div class="print-h2">◆ 44 徽 章 收 集 志</div>
        <div style="margin-bottom:6mm;font-size:11pt;color:#666">按五大模块展示全部徽章 · 点亮表示已获得</div>`;
    Object.keys(ZONES).forEach(z=>{
        const zn=ZONES[z];
        html+=`<div style="margin:6mm 0 3mm;color:#8b0000;font-size:13pt;font-weight:bold">${zn.icon} ${zn.name} · ${zn.mod}（${zn.count} 章）</div>`;
        html+=`<div class="print-badge-grid">`;
        for(let i=1;i<=zn.count;i++){
            const rid=z+i;const r=ROOMS[rid];
            const earned=state.badges.includes(rid);
            const bg=earned?'background:#fff4cc':'background:#f0f0f0;color:#999';
            html+=`<div class="print-badge-item" style="${bg}">
                <div class="print-badge-icon">${earned?'🎖':'·'}</div>
                <div><strong>${rid}</strong></div>
                <div style="font-size:9pt;margin-top:1mm">${r.badge}</div>
                <div style="font-size:8pt;color:#888;margin-top:1mm">${r.title}</div>
            </div>`;
        }
        html+=`</div>`;
    });
    html+=`</div>`;

    // 线索时间轴页
    if(state.clues.length>0){
        html+=`<div class="print-page">
            <div class="print-h2">◆ 调 查 线 索 时 间 轴</div>
            <div style="margin-bottom:6mm;font-size:11pt;color:#666">调查过程中收集到的 ${state.clues.length} 条关键线索（按获得时间排序）</div>`;
        state.clues.forEach((c,i)=>{
            const r=ROOMS[c.rid];
            html+=`<div class="print-clue-item">
                <div class="print-clue-rid">线索 #${i+1} · ${c.rid} · ${ZONES[r.zone].name} · ${r.title}</div>
                <div>${c.text}</div>
            </div>`;
        });
        html+=`</div>`;
    }

    // 终章与感言页
    if(state.ending){
        html+=`<div class="print-page">
            <div class="print-h2">◆ 终 章 · ${endingText}</div>
            <div style="font-size:12pt;line-height:2;margin:8mm 0">${({A:'你们选择了维持金柜——金箔的红宝书被原封放回。但馆长意味深长的目光提醒你们：真正的知识无法被锁住，只是在等待下一次被熔化。',B:'你们选择了散落——红宝书化为金粉与光，散入每一位考研学子的手账本。馆长笑着说："你们做了我 27 年前想做而没做的事。"最年轻的那位研究员举起了手，接过馆长递来的最后一片金箔。',C:'你们选择了折中——红宝书铸成红玺，同时释放 101 份副本流转于阅卷组。权威与普惠同时存在，对立统一，螺旋上升。这是辩证法最朴素的样子。'})[state.ending]}</div>
            <div class="print-quote">「${endQuote}」</div>
            <div style="border-top:1pt solid #d4af37;margin-top:15mm;padding-top:8mm;font-size:11pt;line-height:2;color:#333">
                <strong style="color:#8b0000">—— 5 位主任的临别赠言 ——</strong><br><br>
                <em>辩证·老马：</em>矛盾不会消失，它只会升华。<br>
                <em>润之·老毛：</em>没有调查，就没有发言权——今天你们发言了。<br>
                <em>编年·老史：</em>1840 到 2026，快 200 年了。你们是这 200 年的读者。<br>
                <em>天平·老思：</em>德与法，在你们心里——平衡了。<br>
                <em>风云·小时：</em>下一个五年的红宝书，我们见。
            </div>
            <div class="print-signature">
                北京大学 101 政治阅卷组<br>
                数据归档处 · 馆长 沈藏心 签发<br>
                ${endDate.toLocaleDateString('zh-CN')}
            </div>
        </div>`;
    }

    ps.innerHTML=html;
}
